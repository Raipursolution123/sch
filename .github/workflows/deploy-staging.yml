name: Deploy Staging

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: staging-deploy
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build & Push Images
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.sha.outputs.short }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set image names (GHCR requires lowercase)
        run: |
          repo="ghcr.io/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')"
          echo "BACKEND_IMAGE=${repo}/backend" >> "$GITHUB_ENV"
          echo "FRONTEND_IMAGE=${repo}/frontend" >> "$GITHUB_ENV"

      - name: Set short SHA
        id: sha
        run: echo "short=$(echo ${{ github.event.workflow_run.head_sha || github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/backend/Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.sha.outputs.short }}
          build-args: |
            GIT_SHA=${{ github.event.workflow_run.head_sha || github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/frontend/Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.sha.outputs.short }}
          build-args: |
            GIT_SHA=${{ github.event.workflow_run.head_sha || github.sha }}
            VITE_API_BASE_URL=/api/v1
            VITE_APP_NAME=School ERP (Staging)
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    name: Deploy to Staging Server
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: ${{ secrets.STAGING_SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail
            cd ${{ secrets.STAGING_APP_PATH }}
            TAG="${{ needs.build-and-push.outputs.short_sha }}"
            # Pull the fixed deploy script before running it (server copy may be stale).
            git fetch origin main
            git reset --hard origin/main
            chmod +x scripts/staging-*.sh
            # Keep .env in sync so compose and manual deploys use the CI SHA, not "latest".
            if [[ -f .env ]]; then
              if grep -q '^IMAGE_TAG=' .env; then
                sed -i.bak "s/^IMAGE_TAG=.*/IMAGE_TAG=${TAG}/" .env
              else
                echo "IMAGE_TAG=${TAG}" >> .env
              fi
            fi
            ./scripts/staging-deploy.sh "${TAG}"

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: ${{ secrets.STAGING_SSH_PORT || 22 }}
          script: |
            cd ${{ secrets.STAGING_APP_PATH }}
            chmod +x scripts/staging-*.sh
            bash scripts/staging-healthcheck.sh
