x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

x-security-infra: &security-infra
  security_opt:
    - no-new-privileges:true

x-security-app: &security-app
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

services:
  mysql:
    <<: *security-infra
    image: mysql:8.4
    container_name: school_erp_mysql
    restart: unless-stopped
    cpus: "2.0"
    mem_limit: 2g
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-school_erp}
      MYSQL_USER: ${DB_USER:-school_erp}
      MYSQL_PASSWORD: ${DB_PASSWORD:-school_erp}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - school_erp_network
    logging: *default-logging

  redis:
    <<: *security-infra
    image: redis:7-alpine
    container_name: school_erp_redis
    restart: unless-stopped
    cpus: "0.5"
    mem_limit: 512m
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-devredispassword}
    command: >
      sh -c "redis-server --appendonly yes --requirepass \"$$REDIS_PASSWORD\""
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - school_erp_network
    logging: *default-logging

  backend:
    <<: *security-app
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      target: development
    container_name: school_erp_backend
    restart: unless-stopped
    cpus: "2.0"
    mem_limit: 2g
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
      DB_HOST: mysql
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-school_erp}
      DB_USER: ${DB_USER:-school_erp}
      DB_PASSWORD: ${DB_PASSWORD:-school_erp}
      REDIS_URL: redis://:${REDIS_PASSWORD:-devredispassword}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-devredispassword}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-devredispassword}@redis:6379/2
      RUN_MIGRATIONS: "true"
      RUN_COLLECTSTATIC: "true"
    volumes:
      - ./backend:/app
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - school_erp_network
    logging: *default-logging

  celery_worker:
    <<: *security-app
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      target: development
    container_name: school_erp_celery_worker
    restart: unless-stopped
    cpus: "1.0"
    mem_limit: 1g
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
      DB_HOST: mysql
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-school_erp}
      DB_USER: ${DB_USER:-school_erp}
      DB_PASSWORD: ${DB_PASSWORD:-school_erp}
      REDIS_URL: redis://:${REDIS_PASSWORD:-devredispassword}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-devredispassword}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-devredispassword}@redis:6379/2
      RUN_MIGRATIONS: "false"
      RUN_COLLECTSTATIC: "false"
    command: celery -A config worker -l info
    stop_grace_period: 60s
    healthcheck:
      test: ["CMD", "/celery_healthcheck.sh", "worker"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s
    volumes:
      - ./backend:/app
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - school_erp_network
    logging: *default-logging

  celery_beat:
    <<: *security-app
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      target: development
    container_name: school_erp_celery_beat
    restart: unless-stopped
    cpus: "0.5"
    mem_limit: 512m
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
      DB_HOST: mysql
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-school_erp}
      DB_USER: ${DB_USER:-school_erp}
      DB_PASSWORD: ${DB_PASSWORD:-school_erp}
      REDIS_URL: redis://:${REDIS_PASSWORD:-devredispassword}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-devredispassword}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-devredispassword}@redis:6379/2
      RUN_MIGRATIONS: "false"
      RUN_COLLECTSTATIC: "false"
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    healthcheck:
      test: ["CMD", "/celery_healthcheck.sh", "beat"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    volumes:
      - ./backend:/app
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - school_erp_network
    logging: *default-logging

  frontend:
    <<: *security-app
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      target: development
    container_name: school_erp_frontend
    restart: unless-stopped
    cpus: "1.0"
    mem_limit: 1g
    environment:
      VITE_API_BASE_URL: /api/v1
      VITE_API_PROXY_TARGET: http://backend:8000
      # Bind mounts on Windows/macOS do not propagate inotify events; polling enables HMR.
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      VITE_HMR_HOST: localhost
      VITE_HMR_PORT: ${FRONTEND_PORT:-5173}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - school_erp_network
    logging: *default-logging

volumes:
  mysql_data:
  redis_data:

networks:
  school_erp_network:
    driver: bridge
