# Shared staging stack for school.raipursolutions.com
# Usage: docker compose -f docker-compose.staging.yml up -d
# Deploy: ./scripts/staging-deploy.sh <image-tag>

name: school_staging

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

x-security-infra: &security-infra
  security_opt:
    - no-new-privileges:true

x-security-app: &security-app
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

x-security-nginx: &security-nginx
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  cap_add:
    - NET_BIND_SERVICE

services:
  mysql:
    <<: *security-infra
    image: mysql:8.4
    restart: unless-stopped
    cpus: "1.5"
    mem_limit: 1536m
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - school_erp_network
    logging: *default-logging

  redis:
    <<: *security-infra
    image: redis:7-alpine
    restart: unless-stopped
    cpus: "0.5"
    mem_limit: 256m
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: >
      sh -c "redis-server --appendonly yes --requirepass \"$$REDIS_PASSWORD\""
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - school_erp_network
    logging: *default-logging

  backend:
    <<: *security-app
    image: ${IMAGE_REGISTRY:-ghcr.io/raipursolution123/sch}/backend:${IMAGE_TAG}
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      target: production
    restart: unless-stopped
    cpus: "1.0"
    mem_limit: 1g
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.staging
      DB_HOST: mysql
      # Migrate via scripts/staging-deploy.sh; collectstatic on start for shared volume.
      RUN_MIGRATIONS: "false"
      RUN_COLLECTSTATIC: "true"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    networks:
      - school_erp_network
    logging: *default-logging

  celery_worker:
    <<: *security-app
    image: ${IMAGE_REGISTRY:-ghcr.io/raipursolution123/sch}/backend:${IMAGE_TAG}
    restart: unless-stopped
    cpus: "1.0"
    mem_limit: 512m
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.staging
      DB_HOST: mysql
      RUN_MIGRATIONS: "false"
      RUN_COLLECTSTATIC: "false"
    command: celery -A config worker -l info --concurrency=2
    stop_grace_period: 60s
    healthcheck:
      test: ["CMD", "/celery_healthcheck.sh", "worker"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s
    volumes:
      - media_volume:/app/media
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - school_erp_network
    logging: *default-logging

  celery_beat:
    <<: *security-app
    image: ${IMAGE_REGISTRY:-ghcr.io/raipursolution123/sch}/backend:${IMAGE_TAG}
    restart: unless-stopped
    cpus: "0.25"
    mem_limit: 256m
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.staging
      DB_HOST: mysql
      RUN_MIGRATIONS: "false"
      RUN_COLLECTSTATIC: "false"
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    healthcheck:
      test: ["CMD", "/celery_healthcheck.sh", "beat"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - school_erp_network
    logging: *default-logging

  frontend:
    <<: *security-nginx
    image: ${IMAGE_REGISTRY:-ghcr.io/raipursolution123/sch}/frontend:${IMAGE_TAG}
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      target: production
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
        VITE_APP_NAME: ${VITE_APP_NAME:-School ERP (Staging)}
    restart: unless-stopped
    cpus: "0.25"
    mem_limit: 128m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - school_erp_network
    logging: *default-logging

  nginx:
    <<: *security-nginx
    image: nginx:1.27-alpine
    restart: unless-stopped
    cpus: "0.25"
    mem_limit: 128m
    ports:
      # Use HTTP_BIND_IP + HTTP_PUBLISH_PORT (not HTTP_PORT=ip:port) — see .env.staging.example
      - target: 80
        published: ${HTTP_PUBLISH_PORT:-80}
        host_ip: ${HTTP_BIND_IP:-0.0.0.0}
      - target: 443
        published: ${HTTPS_PUBLISH_PORT:-443}
        host_ip: ${HTTPS_BIND_IP:-0.0.0.0}
    volumes:
      - ./nginx/${NGINX_STAGING_CONF:-nginx.staging.conf}:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/var/www/static:ro
      - media_volume:/var/www/media:ro
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - school_erp_network
    logging: *default-logging

  certbot:
    <<: *security-app
    image: certbot/certbot:v2.11.0
    profiles: ["ssl"]
    restart: unless-stopped
    cpus: "0.25"
    mem_limit: 128m
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Renew twice daily; initial cert is obtained via scripts/staging-init-ssl.sh
    entrypoint: /bin/sh
    command: -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h; done"
    networks:
      - school_erp_network
    logging: *default-logging

volumes:
  mysql_data:
  redis_data:
  static_volume:
  media_volume:
  certbot_conf:
  certbot_www:

networks:
  school_erp_network:
    driver: bridge
