services:
  mysql:
    image: mysql:8.4
    container_name: school_erp_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - school_erp_network

  redis:
    image: redis:7-alpine
    container_name: school_erp_redis
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - school_erp_network

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      target: production
    container_name: school_erp_backend
    restart: always
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DB_HOST: mysql
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - school_erp_network

  celery_worker:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      target: production
    container_name: school_erp_celery_worker
    restart: always
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DB_HOST: mysql
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    command: celery -A config worker -l info --concurrency=4
    volumes:
      - media_volume:/app/media
    depends_on:
      - backend
    networks:
      - school_erp_network

  celery_beat:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      target: production
    container_name: school_erp_celery_beat
    restart: always
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DB_HOST: mysql
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    depends_on:
      - backend
    networks:
      - school_erp_network

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      target: production
    container_name: school_erp_frontend
    restart: always
    networks:
      - school_erp_network

  nginx:
    image: nginx:1.27-alpine
    container_name: school_erp_nginx
    restart: always
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/var/www/static:ro
      - media_volume:/var/www/media:ro
    depends_on:
      - backend
      - frontend
    networks:
      - school_erp_network

volumes:
  mysql_data:
  redis_data:
  static_volume:
  media_volume:

networks:
  school_erp_network:
    driver: bridge
