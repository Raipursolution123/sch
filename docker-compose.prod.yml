# Production stack — align with docker-compose.staging.yml patterns where applicable.
# Usage: docker compose -f docker-compose.prod.yml up -d --build

name: school_prod

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

x-security-infra: &security-infra
  security_opt:
    - no-new-privileges:true

x-security-app: &security-app
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

x-security-nginx: &security-nginx
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  cap_add:
    # Bind :80/:443, and allow master→worker setuid/setgid (user nginx;)
    - NET_BIND_SERVICE
    - SETUID
    - SETGID

services:
  mysql:
    <<: *security-infra
    image: mysql:8.4
    container_name: school_erp_mysql
    restart: always
    cpus: "1.5"
    mem_limit: 1536m
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - school_erp_network
    logging: *default-logging

  redis:
    <<: *security-infra
    image: redis:7-alpine
    container_name: school_erp_redis
    restart: always
    cpus: "0.5"
    mem_limit: 256m
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: >
      sh -c "redis-server --appendonly yes --requirepass \"$$REDIS_PASSWORD\""
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - school_erp_network
    logging: *default-logging

  backend:
    <<: *security-app
    image: school-erp-backend:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      target: production
    container_name: school_erp_backend
    restart: always
    cpus: "1.0"
    mem_limit: 1g
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DB_HOST: mysql
      # Run migrate as a one-off before/after deploy; collectstatic on start for shared volume.
      RUN_MIGRATIONS: "false"
      RUN_COLLECTSTATIC: "true"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    networks:
      - school_erp_network
    logging: *default-logging

  celery_worker:
    <<: *security-app
    image: school-erp-backend:${IMAGE_TAG:-latest}
    container_name: school_erp_celery_worker
    restart: always
    cpus: "1.0"
    mem_limit: 512m
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DB_HOST: mysql
      RUN_MIGRATIONS: "false"
      RUN_COLLECTSTATIC: "false"
    command: celery -A config worker -l info --concurrency=4
    stop_grace_period: 60s
    healthcheck:
      test: ["CMD", "/celery_healthcheck.sh", "worker"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s
    volumes:
      - media_volume:/app/media
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - school_erp_network
    logging: *default-logging

  celery_beat:
    <<: *security-app
    image: school-erp-backend:${IMAGE_TAG:-latest}
    container_name: school_erp_celery_beat
    restart: always
    cpus: "0.25"
    mem_limit: 256m
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DB_HOST: mysql
      RUN_MIGRATIONS: "false"
      RUN_COLLECTSTATIC: "false"
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    healthcheck:
      test: ["CMD", "/celery_healthcheck.sh", "beat"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - school_erp_network
    logging: *default-logging

  frontend:
    <<: *security-nginx
    image: school-erp-frontend:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      target: production
    container_name: school_erp_frontend
    restart: always
    cpus: "0.25"
    mem_limit: 128m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - school_erp_network
    logging: *default-logging

  nginx:
    <<: *security-nginx
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
    image: ${IMAGE_REGISTRY:-ghcr.io/raipursolution123/sch}/nginx:${IMAGE_TAG}
    restart: always
    cpus: "0.25"
    mem_limit: 128m
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/${NGINX_PROD_CONF:-nginx.prod.conf}:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/var/www/static:ro
      - media_volume:/var/www/media:ro
      - ${LETSENCRYPT_PATH:-./certs/letsencrypt}:/etc/letsencrypt:ro
      - ${CERTBOT_WWW_PATH:-./certs/www}:/var/www/certbot:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/nginx-health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - school_erp_network
    logging: *default-logging

volumes:
  mysql_data:
  redis_data:
  static_volume:
  media_volume:

networks:
  school_erp_network:
    driver: bridge
